<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Online Medicine Shop</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      :root {
        --brand: #0e7490;
        --brand-soft: #ecfeff;
        --accent: #f97316;
        --bg: #f8fafc;
        --card: #ffffff;
        --text: #0f172a;
        --muted: #64748b;
      }

      body {
        background: radial-gradient(
          circle at 15% 0%,
          #dbeafe 0%,
          var(--bg) 45%
        );
        color: var(--text);
        min-height: 100vh;
      }

      .topbar {
        background: linear-gradient(120deg, var(--brand) 0%, #155e75 100%);
        color: #fff;
        border-bottom: 3px solid var(--accent);
      }

      .hero {
        background: linear-gradient(135deg, #ffffff 0%, var(--brand-soft) 100%);
        border: 1px solid #dbeafe;
        border-radius: 1rem;
        box-shadow: 0 14px 35px rgba(15, 23, 42, 0.08);
      }

      .product-card img {
        height: 170px;
        object-fit: cover;
      }

      .price-old {
        color: var(--muted);
        text-decoration: line-through;
        margin-right: 8px;
      }

      .status-chip {
        font-size: 0.8rem;
      }
    </style>
  </head>
  <body>
    <header class="topbar py-3 mb-4">
      <div class="container d-flex justify-content-between align-items-center">
        <h1 class="h4 m-0">Online Medicine Shop</h1>
        <span id="serverStatus" class="badge bg-secondary status-chip"
          >Checking backend</span
        >
      </div>
    </header>

    <main class="container pb-5">
      <section class="hero p-4 mb-4">
        <div class="row g-3 align-items-center">
          <div class="col-lg-7">
            <h2 class="h3 mb-2">Medicines delivered quickly and safely</h2>
            <p class="mb-0 text-secondary">
              Browse live inventory from your backend database and add new
              products from this page.
            </p>
          </div>
          <div class="col-lg-5">
            <div class="card border-0 shadow-sm">
              <div class="card-body">
                <h3 class="h6 mb-3">Quick Add Product</h3>
                <form id="productForm" class="row g-2">
                  <div class="col-12">
                    <input
                      class="form-control"
                      name="name"
                      placeholder="Product name"
                      required
                    />
                  </div>
                  <div class="col-12">
                    <input
                      class="form-control"
                      name="category"
                      placeholder="Category"
                      required
                    />
                  </div>
                  <div class="col-12">
                    <input
                      class="form-control"
                      name="image"
                      placeholder="Image URL"
                      required
                    />
                  </div>
                  <div class="col-6">
                    <input
                      class="form-control"
                      type="number"
                      min="0"
                      step="0.01"
                      name="price"
                      placeholder="Price"
                      required
                    />
                  </div>
                  <div class="col-6">
                    <input
                      class="form-control"
                      type="number"
                      min="0"
                      step="0.01"
                      name="discountPrice"
                      placeholder="Discount"
                      required
                    />
                  </div>
                  <div class="col-6">
                    <input
                      class="form-control"
                      type="number"
                      min="0"
                      step="1"
                      name="stock"
                      placeholder="Stock"
                      value="0"
                    />
                  </div>
                  <div class="col-12">
                    <input
                      class="form-control"
                      name="manufacturer"
                      placeholder="Manufacturer"
                    />
                  </div>
                  <div class="col-12">
                    <textarea
                      class="form-control"
                      name="description"
                      rows="2"
                      placeholder="Medicine description"
                    ></textarea>
                  </div>
                  <div class="col-12 form-check ms-1 mt-1">
                    <input
                      class="form-check-input"
                      id="isSafe"
                      type="checkbox"
                      name="isSafe"
                      checked
                    />
                    <label for="isSafe" class="form-check-label"
                      >Safety Assured</label
                    >
                  </div>
                  <div class="col-12 form-check ms-1 mt-1">
                    <input
                      class="form-check-input"
                      id="prescriptionRequired"
                      type="checkbox"
                      name="prescriptionRequired"
                    />
                    <label for="prescriptionRequired" class="form-check-label"
                      >Prescription Required</label
                    >
                  </div>
                  <div class="col-12 mt-2">
                    <button class="btn btn-dark w-100" type="submit">
                      Save Product
                    </button>
                  </div>
                </form>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="card border-0 shadow-sm">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h2 class="h5 m-0">Available Products</h2>
            <button id="refreshBtn" class="btn btn-outline-secondary btn-sm">
              Refresh
            </button>
          </div>
          <p id="productsMessage" class="text-secondary m-0">
            Loading products...
          </p>
          <div id="productsGrid" class="row g-3 mt-1"></div>
        </div>
      </section>
    </main>

    <script>
      const apiBase = window.location.origin;
      const statusEl = document.getElementById("serverStatus");
      const messageEl = document.getElementById("productsMessage");
      const gridEl = document.getElementById("productsGrid");
      const refreshBtn = document.getElementById("refreshBtn");
      const form = document.getElementById("productForm");
      const IMAGE_FALLBACK = "https://via.placeholder.com/600x400?text=Medicine";

      const imageField = form.querySelector('input[name="image"]');
      const imagePreviewWrap = document.createElement("div");
      imagePreviewWrap.className = "col-12";
      imagePreviewWrap.innerHTML = `
        <img
          id="imagePreview"
          src="${IMAGE_FALLBACK}"
          alt="Medicine preview"
          style="width: 100%; max-height: 160px; object-fit: cover; border-radius: 8px; border: 1px solid #e2e8f0;"
        />
      `;
      imageField.closest('.col-12').insertAdjacentElement('afterend', imagePreviewWrap);
      const imagePreview = document.getElementById("imagePreview");

      function updatePreview(url) {
        const nextUrl = /^https?:\/\//i.test(url || "") ? url : IMAGE_FALLBACK;
        imagePreview.src = nextUrl;
      }

      imageField.setAttribute("type", "url");
      imageField.addEventListener("input", (event) => {
        updatePreview((event.target.value || "").trim());
      });

      async function checkServer() {
        try {
          const response = await fetch(`${apiBase}/api/health`);
          if (!response.ok) {
            throw new Error("Health endpoint unavailable");
          }
          statusEl.className = "badge bg-success status-chip";
          statusEl.textContent = "Backend connected";
        } catch (error) {
          statusEl.className = "badge bg-danger status-chip";
          statusEl.textContent = "Backend disconnected";
        }
      }

      function renderProducts(products) {
        gridEl.innerHTML = "";
        if (!products.length) {
          messageEl.textContent =
            "No products found. Add a product to get started.";
          return;
        }

        messageEl.textContent = "";
        products.forEach((item) => {
          const col = document.createElement("div");
          col.className = "col-12 col-sm-6 col-lg-4";
          col.innerHTML = `
          <article class="card product-card h-100 border-0 shadow-sm">
            <img src="${item.image || IMAGE_FALLBACK}" onerror="this.onerror=null;this.src='${IMAGE_FALLBACK}'" class="card-img-top" alt="${item.name}">
            <div class="card-body d-flex flex-column gap-2">
              <h3 class="h6 m-0">${item.name}</h3>
              <p class="text-secondary small m-0">${item.category}</p>
              ${item.manufacturer ? `<p class="text-secondary small m-0">By ${item.manufacturer}</p>` : ""}
              <p class="m-0">
                <span class="price-old">₹${Number(item.price || 0).toFixed(2)}</span>
                <span class="fw-semibold text-success">₹${Number(item.discountPrice || 0).toFixed(2)}</span>
              </p>
              <p class="small m-0 text-secondary">Stock: ${Number(item.stock || 0)}</p>
              ${item.description ? `<p class="small m-0">${item.description}</p>` : ""}
              <span class="badge ${item.isSafe ? "bg-success-subtle text-success-emphasis" : "bg-warning-subtle text-warning-emphasis"} w-fit">
                ${item.isSafe ? "Safety Assured" : "Check Safety Label"}
              </span>
              ${item.prescriptionRequired ? '<span class="badge bg-danger-subtle text-danger-emphasis w-fit">Prescription Required</span>' : ''}
            </div>
          </article>
        `;
          gridEl.appendChild(col);
        });
      }

      async function loadProducts() {
        messageEl.textContent = "Loading products...";
        try {
          const response = await fetch(`${apiBase}/api/products`);
          if (!response.ok) {
            throw new Error("Failed to load products");
          }
          const products = await response.json();
          renderProducts(products);
        } catch (error) {
          messageEl.textContent = error.message;
        }
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();

        const fd = new FormData(form);
        const imageValue = (fd.get("image") || "").toString().trim();
        if (!/^https?:\/\//i.test(imageValue)) {
          alert("Please enter a valid image URL (http/https)");
          return;
        }

        const payload = {
          name: fd.get("name"),
          category: fd.get("category"),
          image: imageValue,
          price: Number(fd.get("price")),
          discountPrice: Number(fd.get("discountPrice")),
          isSafe: fd.get("isSafe") === "on",
          stock: Number(fd.get("stock") || 0),
          manufacturer: fd.get("manufacturer") || "",
          description: fd.get("description") || "",
          prescriptionRequired: fd.get("prescriptionRequired") === "on",
        };

        try {
          const response = await fetch(`${apiBase}/api/products`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });

          if (!response.ok) {
            throw new Error("Failed to create product");
          }

          form.reset();
          document.getElementById("isSafe").checked = true;
          updatePreview("");
          await loadProducts();
        } catch (error) {
          alert(error.message);
        }
      });

      refreshBtn.addEventListener("click", loadProducts);

      checkServer();
      loadProducts();
    </script>
  </body>
</html>
