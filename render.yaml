services:
  - type: web
    name: online-medicine-shop
    env: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGOMS_DISABLE_POSTINSTALL
        value: "1"
      - key: MONGO_URI
        sync: false
